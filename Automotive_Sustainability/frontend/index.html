<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Automotive Sustainability Chatbot</title>
  <link rel="stylesheet" href="/ui/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Automotive Sustainability Chatbot</h1>
    </header>
    <section class="controls">
      <div class="ingest">
        <input id="pdfPath" type="text" placeholder="Path to PDF (optional)">
        <button id="ingestBtn">Ingest</button>
        <span id="ingestStatus"></span>
      </div>
    </section>
    <section id="chat"></section>
  </div>
  <div class="ask-fixed">
    <div class="ask">
      <textarea id="question" rows="2" placeholder="Type a question… or multiple (use new lines or ;)"></textarea>
      <button id="askBtn">Ask</button>
    </div>
  </div>
  <script src="/ui/js/script.js"></script>
</body>
</html>
